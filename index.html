<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Resizer</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        
        #image-container {
            transition: opacity 0.3s ease-in-out;
        }

        .resizer-button {
            transition: background-color 0.3s ease-in-out;
        }

        .progress-bar-container {
            position: relative;
            width: 100%;
            height: 4px;
            background-color: #ddd;
            border-radius: 2px;
            margin-bottom: 20px;
        }

        .progress-bar-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background-color: #68d391;
            transition: width 0.5s ease-out; /* Animation duration set to 0.5 seconds */
            width: 0%;
            border-radius: 2px;
        }

        .progress-text {
            position: absolute;
            top: -20px;
            right: 0;
            font-size: 12px;
            color: #000; /* Changed text color to black */
        }
    </style>
</head>

<body class="bg-violet-300">
    <div class="container mx-auto py-8">
        <h1 class="text-3xl font-bold mb-4">Image Resizer</h1>
        <div class="flex items-center mb-4">
            <label for="image-input" class="bg-black text-white px-4 py-2 rounded cursor-pointer mr-4 flex items-center">
                Choose File
                <svg class="h-5 w-5 ml-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
            </label>
            <input type="file" id="image-input" accept="image/*" class="hidden">
            <div class="dropdown inline-block relative mr-4">
                <ul class="dropdown-menu absolute hidden text-gray-700 pt-1">
                    <li><a class="rounded-t bg-gray-200 hover:bg-gray-400 py-2 px-4 block whitespace-no-wrap" href="#">Device</a></li>
                    <li><a class="bg-gray-200 hover:bg-gray-400 py-2 px-4 block whitespace-no-wrap" href="#">Dropdown</a></li>
                    <li><a class="rounded-b bg-gray-200 hover:bg-gray-400 py-2 px-4 block whitespace-no-wrap" href="#">Google Drive</a></li>
                </ul>
            </div>
        </div>
        <div id="image-container" class="hidden opacity-0 transition-opacity mb-4">
            <img id="uploaded-image" src="#" alt="Uploaded Image" class="my-4 rounded shadow-lg">
        </div>
        <div class="progress-bar-container">
            <div class="progress-bar-fill" id="progress-bar-fill"></div>
            <div class="progress-text" id="progress-text">Uploaded: <span id="progress-percent">0%</span></div>
        </div>
        <button id="resize-button-instagram" class="resizer-button bg-blue-500 text-white px-4 py-2 rounded mr-2">Instagram (1080x1080)</button>
        <button id="resize-button-facebook" class="resizer-button bg-blue-500 text-white px-4 py-2 rounded mr-2">Facebook (1200x630)</button>
        <button id="resize-button-twitter" class="resizer-button bg-blue-500 text-white px-4 py-2 rounded mr-2">Twitter (1200x675)</button>
        <button id="resize-button-website" class="resizer-button bg-blue-500 text-white px-4 py-2 rounded">Website (600x300)</button>
    </div>   
<script src="./script.js"></script>
</body>

</html>
